<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Calculator app</title>
</head>

<body class="theme1">
  <div class="container">
    <header>
      <p class="logo">calc</p>
      <div class="theme_div">
        <p class="theme_numbers">1 2 3</p>
        <label for="theme">THEME</label>
        <input type="range" name="theme" id="theme" min="1" max="3" value="1" range = "1">
      </div>
    </header>
    <main>
      <div class="display_screen">
        <p class="display_operation"></p>
        <p class="display_next_result"></p>
      </div>
      <div class="keys_div">
        <button class="small_button digit" data-value="7">7</button>
        <button class="small_button digit" data-value="8">8</button>
        <button class="small_button digit" data-value="9">9</button>
        <button class="small_button del_button" id="delete_button">DEL</button>
        <button class="small_button digit" data-value="4">4</button>
        <button class="small_button digit" data-value="5">5</button>
        <button class="small_button digit" data-value="6">6</button>
        <button class="small_button operator" data-value="+">+</button>
        <button class="small_button digit" data-value="1">1</button>
        <button class="small_button digit" data-value="2">2</button>
        <button class="small_button digit" data-value="3">3</button>
        <button class="small_button operator" data-value="-">-</button>
        <button class="small_button decimal" data-value=".">.</button>
        <button class="small_button digit" data-value="0">0</button>
        <button class="small_button operator" data-value="/">/</button>
        <button class="small_button operator" data-value="*">*</button>
        <button class="large_button reset_button" id="reset_button">RESET</button>
        <button class="large_button equal_button" id="equal_button">=</button>
      </div>
    </main>
  </div>
  <script src="calculator.js" defer></script>
</body>
</html>

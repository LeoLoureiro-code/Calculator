<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Calculator app</title>
</head>
<body>
  <header>
    <p class="logo">CALC</p>
    <label for="theme">THEME</label>
    <input type="range" name="theme" id="theme" min="1" max="3">
  </header>
  <main>
    <div class="display_screen"></div>
    <div class="keys_div">
      <button class="small_button">7</button>
      <button class="small_button">8</button>
      <button class="small_button">9</button>
      <button class="small_button">DEL</button>
      <button class="small_button">4</button>
      <button class="small_button">5</button>
      <button class="small_button">6</button>
      <button class="small_button">+</button>
      <button class="small_button">1</button>
      <button class="small_button">2</button>
      <button class="small_button">3</button>
      <button class="small_button">-</button>
      <button class="small_button">.</button>
      <button class="small_button">0</button>
      <button class="small_button">/</button>
      <button class="small_button">*</button>
      <button class="large_button">RESET</button>
      <button class="large_button">=</button>
    </div>
  </main>
</body>
</html>
